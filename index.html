<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Will You Be My Valentine?</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 90%;
            width: 100%;
            box-sizing: border-box;
        }

        .gif-header {
            max-width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.6rem;
            margin: 20px 0 40px;
            color: #e74c3c;
        }

        .buttons {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 60px;
            height: 90px;
            flex-wrap: wrap;
        }

        button {
            font-size: 1.5rem;
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.15s ease;
            user-select: none;
            min-width: 140px;
        }

        #yesBtn {
            background: #e74c3c;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.15);
            background: #c0392b;
        }

        #noBtn {
            background: #7f8c8d;
            color: white;
            position: absolute;
        }

        .celebration {
            display: none;
            font-size: 3.5rem;
            color: #e74c3c;
            margin-top: 30px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            width: 100%;
        }

        .modal-content img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin: 15px 0;
        }

        .modal-content h2 {
            color: #e74c3c;
            margin: 10px 0 20px;
            font-size: 2.2rem;
        }

        .date-info {
            font-size: 1.35rem;
            color: #444;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #f0caca;
            line-height: 1.6;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 2.5rem;
            font-weight: bold;
            color: #555;
            cursor: pointer;
        }

        .close:hover {
            color: #e74c3c;
        }

        /* ============================================= */
        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .container {
                padding: 30px 25px;
                border-radius: 16px;
            }

            p {
                font-size: 1.4rem;
                margin: 15px 0 30px;
            }

            .buttons {
                gap: 40px;
                height: auto;
                flex-direction: column;
                align-items: center;
            }

            button {
                font-size: 1.35rem;
                padding: 14px 50px;
                min-width: 180px;
            }

            #noBtn {
                position: absolute;
                /* still moves around, but container is smaller */
            }

            .celebration {
                font-size: 2.6rem;
            }

            .modal-content {
                padding: 24px 20px;
            }

            .modal-content h2 {
                font-size: 1.9rem;
            }

            .date-info {
                font-size: 1.2rem;
            }

            .close {
                font-size: 2.2rem;
                right: 15px;
            }
        }

        @media (max-width: 400px) {
            button {
                font-size: 1.25rem;
                padding: 12px 40px;
                min-width: 160px;
            }

            .modal-content {
                padding: 20px 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="https://i.pinimg.com/originals/c5/0a/c9/c50ac977b8a89140fc3f7bcb1a05e146.gif" class="gif-header"
            alt="Romantic gif" />

        <p>Will you be my Valentine, Mama? ❤️</p>

        <div class="buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>

        <div id="celebration" class="celebration">Yay! 💕 I love you!</div>
    </div>

    <!-- ===== MODAL ===== -->
    <div id="dateModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>

            <h2>Be ready for our date! 💕</h2>

            <img src="https://i.pinimg.com/originals/7c/64/6f/7c646f136ddddd35debe5d0da95ed5c3.gif"
                alt="Romantic celebration gif">

            <p style="font-size: 1.3rem; color: #555; margin: 20px 0;">
                Dress up nicely!
            </p>

            <p class="date-info">
                Thursday, 12 February 2026 at 17:15<br>
                FIRE Steakhouse & Bar<br>
            </p>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const buttons = document.querySelector('.buttons');
        const celebration = document.getElementById('celebration');
        const modal = document.getElementById('dateModal');
        const closeBtn = document.querySelector('.close');

        function moveNoButton() {
            const area = buttons.getBoundingClientRect();
            const btn = noBtn.getBoundingClientRect();

            const maxX = area.width - btn.width;
            const maxY = area.height - btn.height;

            noBtn.style.left = `${Math.random() * maxX}px`;
            noBtn.style.top = `${Math.random() * maxY}px`;
        }

        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('mousemove', moveNoButton);
        noBtn.addEventListener('touchstart', e => {
            e.preventDefault();
            moveNoButton();
        });
        noBtn.addEventListener('click', e => {
            e.preventDefault();
            moveNoButton();
        });

        yesBtn.addEventListener('click', () => {
            celebration.style.display = 'block';
            yesBtn.textContent = 'My Valentine! 🥰';
            yesBtn.disabled = true;
            modal.style.display = 'flex';
        });

        function resetPage() {
            modal.style.display = 'none';
            location.reload();
        }

        closeBtn.addEventListener('click', resetPage);

        window.addEventListener('click', e => {
            if (e.target === modal) resetPage();
        });
    </script>

</body>

</html>
